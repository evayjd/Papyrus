services:
  postgres:
    image: postgres:16
    container_name: papyrus-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: papyrus
    ports:
      - "5433:5432"
    volumes:
      - papyrus-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: papyrus-redis
    ports:
      - "6379:6379"

volumes:
  papyrus-postgres-data: